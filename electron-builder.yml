appId: com.videoclipper.app
productName: Video Clipper
directories:
  buildResources: resources
  output: release
files:
  - out/**/*
  - "!node_modules/**/*"
win:
  target:
    - nsis
mac:
  target:
    - dmg
  category: public.app-category.video
linux:
  target:
    - AppImage
  category: Video
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
extraResources:
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - "**/*"
  - from: resources/whisper
    to: whisper
    filter:
      - "**/*"
